hector_mapping:
  ros__parameters:
    map_frame: map
    base_frame: base_link
    odom_frame: base_link
    map_resolution: 0.05
    map_size: 1024
    map_start_x: 0.5
    map_start_y: 0.5
    laser_min_dist: 0.4
    laser_max_dist: 8.0
    update_factor_free: 0.4
    update_factor_occupied: 0.9
    map_update_distance_thresh: 0.1
    map_update_angle_thresh: 0.08
    pub_drawings: false
    pub_debug_output: false

rplidar:
  ros__parameters:
    serial_port: /dev/ttyUSB0
    serial_baudrate: 115200
    frame_id: laser
    angle_compensate: true
