slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan_filtered
    mode: localization
    autostart: true

    use_pose_extrapolator: false

    debug_logging: false
    # Handheld: process every scan (no wheel odom to gate on)
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 5.0
    resolution: 0.05
    max_laser_range: 8.0
    minimum_time_interval: 0.2
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    use_scan_matching: true
    use_scan_barycenter: true
    # 0.0 because odom->base_link is a static identity TF: motion comes from
    # scan matching. Positive values freeze tracking against the static odom.
    minimum_travel_distance: 0.0
    minimum_travel_heading: 0.0
    scan_buffer_size: 15
    scan_buffer_maximum_scan_distance: 8.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 2.0

    do_loop_closing: false

    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.5
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_search_space_resolution: 0.01
