scan_to_scan_filter_chain:
  ros__parameters:
    filter1:
      name: range_filter
      type: laser_filters/LaserScanRangeFilter
      params:
        use_message_range_limits: false
        lower_threshold: 0.15
        upper_threshold: 8.0
        lower_replacement_value: -.inf
        upper_replacement_value: .inf

    # Uncomment to block a sector if the laptop body appears in the scan.
    # Adjust lower_angle/upper_angle (radians) to match the blocked arc.
