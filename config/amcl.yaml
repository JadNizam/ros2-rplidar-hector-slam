amcl:
  ros__parameters:
    use_sim_time: false

    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"

    scan_topic: /scan_filtered
    laser_max_range: 8.0
    laser_min_range: -1.0
    max_beams: 120
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    sigma_hit: 0.2
    z_hit: 0.5
    z_rand: 0.5
    z_max: 0.05
    z_short: 0.05
    lambda_short: 0.1
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

    robot_model_type: "nav2_amcl::OmniMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    min_particles: 800
    max_particles: 5000
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    resample_interval: 1

    update_min_d: 0.1
    update_min_a: 0.1
    save_pose_rate: 0.5
    transform_tolerance: 1.0

    set_initial_pose: false
    always_reset_initial_pose: false
    tf_broadcast: true
    first_map_only: true
